<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ofertas Imperdíveis</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        text-align: center;
        margin: 0;
        padding: 0;
      }

      header {
        background: #000;
        color: white;
        padding: 20px;
      }

      .container {
        padding: 30px;
      }

      .card {
        background: white;
        padding: 20px;
        margin: 20px auto;
        width: 300px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      .card img {
        width: 100%;
        border-radius: 10px;
      }

      .botao {
        display: inline-block;
        margin-top: 10px;
        padding: 12px 20px;
        background: #ff4d00;
        color: white;
        text-decoration: none;
        border-radius: 5px;
        font-weight: bold;
      }

      .botao:hover {
        background: #e63e00;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>🔥 Ofertas do Dia</h1>
      <p>Produtos selecionados com desconto</p>
    </header>

    <div class="container">
      <div class="card">
        <img src="produto.jpg" alt="Produto" />
        <h2>Bomba de Ar Portátil</h2>
        <p>Compressor portátil 4 em 1 com bateria 8000mAh.</p>

        <a class="botao" href="COLE_SEU_LINK_AFILIADO_AQUI" target="_blank">
          Comprar Agora
        </a>
      </div>
    </div>
  </body>
</html>
