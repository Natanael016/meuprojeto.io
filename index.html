<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Achadinhos da Shopee</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <h1>🔥 Achadinhos da Shopee</h1>

      <input type="text" id="buscar" placeholder="Buscar produto..." />

      <div class="categorias">
        <button data-cat="todos">Todos</button>
        <button data-cat="eletronico">Eletrônicos</button>
        <button data-cat="relogio">Relógios</button>
        <button data-cat="Roupas">Roupas</button>
      </div>
    </header>

    <main>
      <section id="produtos" class="produtos"></section>
    </main>

    <footer>
      <p>Site de ofertas afiliadas da Shopee</p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
